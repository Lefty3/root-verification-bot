name: Deploy to Root

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Extract publish binary
        run: |
          cd node_modules/@rootsdk/dev-tools/publish/bin
          tar -xzf appsdk-lite-console-linux-x64-libc.tar.gz
          chmod +x RootApp.AppSdk.Lite.Console

      - name: Build
        run: npm run build

      - name: Package
        run: npx rootsdk build package --output-file ./dist/root-verification-bot.pkg

      - name: Upload to Root
        run: npx rootsdk upload package --file ./dist/root-verification-bot.pkg --authToken "${{ secrets.ROOT_AUTH_TOKEN }}"
